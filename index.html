<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gold Price Calculator UK</title>
  <meta name="description" content="Calculate how much your gold is worth instantly using UK gold prices.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial; max-width: 600px; margin: auto; padding: 20px;">

<h1>Gold Price Calculator (UK)</h1>

<label>Weight (grams):</label><br>
<input type="number" id="weight" placeholder="Enter weight"><br><br>

<label>Purity:</label><br>
<select id="purity">
  <option value="0.375">9ct</option>
  <option value="0.585">14ct</option>
  <option value="0.75">18ct</option>
  <option value="0.916">22ct</option>
</select><br><br>

<label>Gold price (£ per gram):</label><br>
<input type="number" id="price" value="60"><br><br>

<button onclick="calculate()">Calculate</button>

<h2 id="result"></h2>

<script>
function calculate() {
  let weight = document.getElementById('weight').value;
  let purity = document.getElementById('purity').value;
  let price = document.getElementById('price').value;

  let value = weight * purity * price;

  document.getElementById('result').innerText =
    "Estimated Value: £" + value.toFixed(2);
}
</script>

<hr>

<p>

</p>

</body>
</html>
